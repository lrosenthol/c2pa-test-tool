description: PNG with valid C2PA manifest
inputs:
  assetPath: ./png_valid.png
  claimSignerTrustListPaths:
  - certs/root_ca1_cert.pem
  tsaTrustListPaths:
  - certs/root_ca1_cert.pem
  validationTime: "2001-06-01T00:00:00Z"
manifests:
- failures:
    isEmpty: {}
  successes:
    containsAllOf:
      codes:
      - claimSignature.validated
      - signingCredential.trusted
