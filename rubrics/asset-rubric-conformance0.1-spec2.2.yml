rubric_metadata:
  name: C2PA Asset Conformance 0.1 Spec 2.2 Rubric
  issuer: C2PA Conformance Task Force
  date: '2026-03-31T05:00:00Z'
  version: 0.1.0
  language: en
variables:
  $well_formed_error_codes:
  - assertion.action.malformed
  - assertion.bmffHash.malformed
  - assertion.boxesHash.malformed
  - assertion.collectionHash.malformed
  - assertion.dataHash.malformed
  - assertion.external-reference.malformed
  - assertion.ingredient.malformed
  - assertion.alternativeContentRepresentation.malformed
  - assertion.multiAssetHash.malformed
  - assertion.cbor.invalid
  - assertion.json.invalid
  - claim.cbor.invalid
  - claim.hardBindings.missing
  - claim.malformed
  - claim.missing
  - claim.multiple
  - hashedURI.missing
  - ingredient.manifest.missing
  - assertion.boxesHash.unknownBox
  - assertion.multipleHardBindings
  - manifest.compressed.invalid
  - manifest.html.multipleManifests
  - manifest.inaccessible
  - manifest.multipleParents
  - manifest.structuredText.emptyReference
  - manifest.structuredText.malformedReference
  - manifest.structuredText.multipleReferences
  - manifest.structuredText.noManifest
  - manifest.structuredText.noResolutionPath
  - manifest.timestamp.invalid
  - manifest.timestamp.wrongParents
  - manifest.update.invalid
  - manifest.update.wrongParents
  - MISSING_VALIDATION_RESULTS
  $valid_error_codes:
  - assertion.action.ingredientMismatch
  - assertion.action.redactionMismatch
  - assertion.bmffHash.mismatch
  - assertion.boxesHash.mismatch
  - assertion.collectionHash.mismatch
  - assertion.dataHash.mismatch
  - assertion.external-reference.hashMismatch
  - assertion.alternativeContentRepresentation.hashMismatch
  - assertion.multiAssetHash.mismatch
  - assertion.hashedURI.mismatch
  - hashedURI.mismatch
  - ingredient.manifest.mismatch
  - ingredient.claimSignature.missing
  - ingredient.claimSignature.mismatch
  - claimSignature.missing
  - MISSING_VALIDATION_RESULTS
  $trust_error_codes:
  - claimSignature.mismatch
  - claimSignature.outsideValidity
  - signingCredential.invalid
  - signingCredential.ocsp.revoked
  - signingCredential.untrusted
  - MISSING_VALIDATION_RESULTS
  $valid_relationship_values:
  - parentOf
  - inputTo
  - componentOf
  $human_entry_source_types:
  - humanEntry.anonymous
  - humanEntry.credentialed
  $allowed_assertions:
  - c2pa.hash.data
  - c2pa.hash.data.part
  - c2pa.actions.v2
  - c2pa.ingredient.v3
  - c2pa.hash.boxes
  - c2pa.hash.bmff.v3
  - c2pa.hash.collection.data
  - c2pa.soft-binding
  - c2pa.cloud-data
  - c2pa.embedded-data
  - c2pa.metadata
  - c2pa.certificate-status
  - c2pa.asset-ref
  - c2pa.asset-type.v2
  - c2pa.hash.multi-asset
  - c2pa.thumbnail.claim
  - c2pa.thumbnail.ingredient
  - c2pa.depthmap.GDepth
  - c2pa.icon
  - c2pa.assertion.metadata
  - c2pa.time-stamp
  $allowed_actions:
  - c2pa.addedText
  - c2pa.adjustedColor
  - c2pa.changedSpeed
  - c2pa.color_adjustments
  - c2pa.converted
  - c2pa.created
  - c2pa.cropped
  - c2pa.deleted
  - c2pa.drawing
  - c2pa.dubbed
  - c2pa.edited
  - c2pa.edited.metadata
  - c2pa.enhanced
  - c2pa.filtered
  - c2pa.opened
  - c2pa.orientation
  - c2pa.placed
  - c2pa.published
  - c2pa.redacted
  - c2pa.removed
  - c2pa.repackaged
  - c2pa.resized
  - c2pa.transcoded
  - c2pa.translated
  - c2pa.trimmed
  - c2pa.unknown
  - c2pa.watermarked
  $deprecated_assertion_labels:
  - c2pa.claim
  - c2pa.hash.bmff.v2
  - c2pa.asset-type
  - c2pa.ingredient
  - c2pa.ingredient.v2
  - c2pa.actions
  $deprecated_action_labels:
  - c2pa.copied
  - c2pa.formatted
  - c2pa.version_updated
  - c2pa.printed
  - c2pa.managed
  - c2pa.produced
  - c2pa.saved
  - c2pa.color_adjustments
  - c2pa.watermarked
  $standard_parameters:
  - redacted
  - ingredients
  - ingredient
  - sourceLanguage
  - targetLanguage
  - multipleInstances
  - ranges
  - weight
  - width
  - italic
  - slant
  - optical-size
expressions:
  _manifest_validationResults: '(@.validationResults || { failure: [{code: "MISSING_VALIDATION_RESULTS"}] })'
  _manifest_assertionKeys: keys(@.assertions || `{}`)
  _manifest_assertionValues: values(@.assertions || `{}`)
  _manifest_actionsV2: |
    @.assertions.'c2pa.actions.v2'.actions || `[]`
  _manifest_createdAssertions: |
    @.'claim.v2'.created_assertions || `[]`
  _manifest_ingredientAssertions: values(@.assertions || `{}`)[? relationship != null]
  _activeManifest: manifests[0]
  _validationResults: _manifest_validationResults(_activeManifest())
  _assertionKeys: _manifest_assertionKeys(_activeManifest())
  _assertionValues: _manifest_assertionValues(_activeManifest())
  _actionsV2: _manifest_actionsV2(_activeManifest())
  _createdAssertions: _manifest_createdAssertions(_activeManifest())
  _ingredientAssertions: _manifest_ingredientAssertions(_activeManifest())

---

- id: validation:no_dst_for_opened_action
  description: Check that c2pa.opened actions do not have digitalSourceType
  expression: |
    length(_actionsV2()[?action == "c2pa.opened" && digitalSourceType != null]) == 0
  reportText:
    'true':
      en: No c2pa.opened actions have a digitalSourceType
    'false':
      en: Found c2pa.opened actions with a digitalSourceType
- id: validation:inception_action_position
  description: |-
    Check if an inception action is the first action in the first actions assertion in created_assertions (mandatory since Conformance v0.1)
  expression: |
    endsWith(notNull(_createdAssertions()[?contains(url, "c2pa.actions")] | [0].url, ""), "c2pa.actions.v2") &&
    (length(_actionsV2()[?action == "c2pa.created"]) == 0 ||
      contains(`["c2pa.created", "c2pa.opened"]`, _actionsV2()[0].action))
  reportText:
    'true':
      en: |-
        Inception action is correctly positioned as the first item in the first created actions assertion
    'false':
      en: |-
        Inception action is not in the first actions assertion of created_assertions (or first item is not an actions assertion)
- id: validation:no_deprecated_assertions
  description: Check for known deprecated assertion labels (mandatory since Conformance v0.1)
  failIfMatched: true
  expression: |
    _assertionKeys()[?startsWith(@, "stds.") || contains($deprecated_assertion_labels, @)]
  reportText:
    'true':
      en: No deprecated standard assertions found
    'false':
      en: 'Found deprecated standard assertions: {{matches}}'
- id: validation:no_unsupported_assertions
  description: |-
    Check if all C2PA standard assertions are in the allow-list (mandatory since Conformance v0.1)
  failIfMatched: true
  expression: |
    _assertionKeys()[?startsWith(@, "c2pa.") &&
      !contains($allowed_assertions, @) &&
      !(contains(@, "__") && contains(startsWith(@, $allowed_assertions), `true`)) &&
      !contains($deprecated_assertion_labels, @)]
  reportText:
    'true':
      en: All standard assertions are supported for this spec version
    'false':
      en: 'Found unsupported or unknown standard C2PA assertions: {{matches}}'
- id: validation:no_deprecated_actions
  description: |-
    Check for deprecated action types in c2pa.actions.v2 (mandatory since Conformance v0.1)
  failIfMatched: true
  expression: '_actionsV2()[?contains($deprecated_action_labels, action)].action

    '
  reportText:
    'true':
      en: No deprecated actions used
    'false':
      en: 'Found deprecated actions: {{matches}}'
- id: validation:no_unsupported_actions
  description: |-
    Check if all C2PA standard actions are in the allow-list (mandatory since Conformance v0.1)
  failIfMatched: true
  expression: |
    _actionsV2()[?startsWith(action, "c2pa.") && !contains($allowed_actions, action)].action
  reportText:
    'true':
      en: All standard actions are supported for this spec version
    'false':
      en: 'Found unsupported or unknown standard C2PA actions: {{matches}}'
- id: validation:no_unrecognized_custom_assertions
  description: |-
    Verify that custom assertions conform to entity-specific namespacing (MUST contain a dot '.') (mandatory since Conformance v0.1)
  failIfMatched: true
  expression: |
    _assertionKeys()[?
      !startsWith(@, "c2pa.") &&
      !contains(@, ".")
    ]
  reportText:
    'true':
      en: All custom assertions conform to entity-specific namespacing (contain a dot '.')
    'false':
      en: |-
        Found custom assertions violating namespacing rules (missing a dot '.'): {{matches}}
- id: validation:no_unrecognized_custom_actions
  description: |-
    Verify that custom actions conform to entity-specific namespacing (MUST contain a dot '.') (mandatory since Conformance v0.1)
  failIfMatched: true
  expression: |
    _actionsV2()[?
      !startsWith(action, "c2pa.") &&
      !contains(action, ".")
    ].action
  reportText:
    'true':
      en: All custom actions conform to entity-specific namespacing (contain a dot '.')
    'false':
      en: |-
        Found custom actions violating namespacing rules (missing a dot '.'): {{matches}}
- id: validation:no_unrecognized_custom_action_parameters
  description: |-
    Verify that custom action parameters conform to entity-specific namespacing (MUST contain a dot '.') (mandatory since Conformance v0.1)
  failIfMatched: true
  expression: |
    _actionsV2()[?parameters != null] |
      [].keys(parameters)[] |
      [? !contains($standard_parameters, @) && !contains(@, ".")]
  reportText:
    'true':
      en: |-
        All custom action parameters conform to entity-specific namespacing (contain a dot '.')
    'false':
      en: |-
        Found custom action parameters violating namespacing rules (missing a dot '.'): {{matches}}
- id: validation:well_formed_data_present
  description: Check if validation results are present for structural analysis
  expression: 'manifests[0].validationResults != null

    '
  reportText:
    'true':
      en: Validation results are present for structural analysis
    'false':
      en: Missing validation results in the manifest
- id: validation:well_formed_success
  description: |-
    Check if the asset has any structural or malformation failures (from the well-formed list)
  failIfMatched: true
  expression: '_validationResults().failure[?contains($well_formed_error_codes, code)].code

    '
  reportText:
    'true':
      en: No structural failures found
    'false':
      en: 'Found structural failures: {{matches}}'
- id: validation:valid_data_present
  description: Check if validation results are present for integrity analysis
  expression: 'manifests[0].validationResults != null

    '
  reportText:
    'true':
      en: Validation results are present for integrity analysis
    'false':
      en: Missing validation results in the manifest
- id: validation:valid_success
  description: Check if the asset has any validation mismatches (from the valid list)
  failIfMatched: true
  expression: '_validationResults().failure[?contains($valid_error_codes, code)].code

    '
  reportText:
    'true':
      en: No validation mismatches found
    'false':
      en: 'Found validation mismatches: {{matches}}'
- id: validation:trusted_data_present
  description: Check if validation results are present for trust analysis
  expression: 'manifests[0].validationResults != null

    '
  reportText:
    'true':
      en: Validation results are present for trust analysis
    'false':
      en: Missing validation results in the manifest
- id: validation:trusted_success
  description: Check if the asset has any trust failures (from the trusted list)
  failIfMatched: true
  expression: '_validationResults().failure[?contains($trust_error_codes, code)].code

    '
  reportText:
    'true':
      en: Asset is trusted
    'false':
      en: 'Found trust failures: {{matches}}'
- id: validation:active_manifest_urn
  description: Check if the active manifest URN uses 'urn:c2pa:' prefix (v2.2+ requirement)
  expression: 'startsWith(notNull(manifests[0].label, ""), "urn:c2pa:")

    '
  reportText:
    'true':
      en: Active manifest URN uses standard 'urn:c2pa:' prefix
    'false':
      en: Active manifest URN uses old 'urn:uuid' prefix (pre-v2.2)
- id: validation:review_ratings_datasource
  description: Check that reviewRatings is absent when dataSource type is human entry
  expression: |
    length(_assertionValues()[? reviewRatings != null && contains($human_entry_source_types, dataSource.type)]) == 0
  reportText:
    'true':
      en: No invalid co-occurrence of reviewRatings and human entry dataSource
    'false':
      en: Found reviewRatings in an assertion with human entry dataSource
- id: validation:ingredient_v3_no_active_manifest
  description: Check that ingredient v3 has no validationResults if no activeManifest
  expression: |
    length(_ingredientAssertions()[? activeManifest == null && validationResults != null]) == 0
  reportText:
    'true':
      en: Ingredient v3 assertions without activeManifest correctly omit validationResults
    'false':
      en: |-
        Found ingredient v3 assertion without activeManifest but containing validationResults
- id: validation:ingredient_v3_mandatory_validation_results
  description: Check that ingredient v3 has validationResults if activeManifest is present
  expression: |
    length(_ingredientAssertions()[? activeManifest != null && validationResults == null]) == 0
  reportText:
    'true':
      en: Ingredient v3 assertions with activeManifest correctly include validationResults
    'false':
      en: Found ingredient v3 assertion with activeManifest but missing validationResults
- id: validation:ingredient_relationship_values
  description: Check that the relationship field in all ingredient assertions is valid
  failIfMatched: true
  expression: |
    _ingredientAssertions()[? !contains($valid_relationship_values, relationship)].relationship
  reportText:
    'true':
      en: All ingredient assertions have valid relationship values
    'false':
      en: 'Found ingredient assertion with invalid relationship value: {{matches}}'
- id: validation:mandatory_dst_for_created_action
  description: |-
    Check that c2pa.created actions have a digitalSourceType (mandatory since Spec 2.2)
  expression: |
    length(_actionsV2()[?action == "c2pa.created" && digitalSourceType == null]) == 0
  reportText:
    'true':
      en: All c2pa.created actions have a digitalSourceType
    'false':
      en: Found c2pa.created action missing a digitalSourceType
